server {
    listen 80 default_server;

    resolver 127.0.0.11 ipv6=off valid=30s;
    proxy_intercept_errors on;
    error_page 500 502 503 504 /error.html;

    location = /error.html {
        root /usr/share/nginx/html;
        internal;
    }

    location /promospy-scrapper/ {
        rewrite ^/promospy-scrapper/(.*)$ /$1 break;
        set $promospy_scrapper_upstream http://PromoSpyScrapper:8000;
        proxy_pass $promospy_scrapper_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /promospy-notification/ {
        rewrite ^/promospy-notification/(.*)$ /$1 break;
        set $promospy_notification_upstream http://PromoSpyNotification:3000;
        proxy_pass $promospy_notification_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /rabbitmq/ {
        rewrite ^/rabbitmq/(.*)$ /$1 break;
        set $rabbitmq_upstream http://nginx_rabbitmq:15672;
        proxy_pass $rabbitmq_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        return 200 "Nginx online\n";
    }
}
