<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Service unavailable</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4efe6;
            --panel: #fffaf2;
            --text: #1f1a17;
            --muted: #6f6258;
            --accent: #c45c2d;
            --border: #e8d8c7;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: Georgia, "Times New Roman", serif;
            background:
                radial-gradient(circle at top, rgba(196, 92, 45, 0.18), transparent 32%),
                linear-gradient(180deg, #f8f1e8 0%, var(--bg) 100%);
            color: var(--text);
        }

        main {
            width: min(100%, 640px);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px 32px;
            box-shadow: 0 20px 60px rgba(69, 45, 29, 0.12);
        }

        .eyebrow {
            display: inline-block;
            margin-bottom: 12px;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(196, 92, 45, 0.1);
            color: var(--accent);
            font: 600 12px/1.2 Arial, sans-serif;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 5vw, 3.5rem);
            line-height: 0.95;
        }

        p {
            margin: 0;
            max-width: 52ch;
            color: var(--muted);
            font: 400 1rem/1.6 Arial, sans-serif;
        }
    </style>
</head>
<body>
    <main>
        <div class="eyebrow">Temporary outage</div>
        <h1>That page is unavailable right now.</h1>
        <p>The upstream service did not respond. Nginx is still online, but this route is temporarily unavailable. Try again in a moment.</p>
    </main>
</body>
</html>
